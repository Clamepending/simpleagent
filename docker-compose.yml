services:
  simpleagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simpleagent
    restart: unless-stopped
    environment:
      PORT: "18789"
      SIMPLEAGENT_LLM_URL: "${SIMPLEAGENT_LLM_URL:-http://host.docker.internal:11434/v1/chat/completions}"
      SIMPLEAGENT_MODEL: "${SIMPLEAGENT_MODEL:-llama3.2}"
      SIMPLEAGENT_SERVICE_MODE: "${SIMPLEAGENT_SERVICE_MODE:-all}"
      SIMPLEAGENT_EXECUTOR_AUTO_RUN: "${SIMPLEAGENT_EXECUTOR_AUTO_RUN:-0}"
      SIMPLEAGENT_DELIVERY_AUTO_RUN: "${SIMPLEAGENT_DELIVERY_AUTO_RUN:-0}"
      SIMPLEAGENT_TELEGRAM_POLLER_ENABLED: "${SIMPLEAGENT_TELEGRAM_POLLER_ENABLED:-1}"
      SIMPLEAGENT_TELEGRAM_POLL_TIMEOUT_S: "${SIMPLEAGENT_TELEGRAM_POLL_TIMEOUT_S:-25}"
      SIMPLEAGENT_TELEGRAM_POLL_RETRY_S: "${SIMPLEAGENT_TELEGRAM_POLL_RETRY_S:-5}"
      SIMPLEAGENT_QUEUE_POLL_INTERVAL_MS: "${SIMPLEAGENT_QUEUE_POLL_INTERVAL_MS:-200}"
      SIMPLEAGENT_QUEUE_LOCK_TIMEOUT_S: "${SIMPLEAGENT_QUEUE_LOCK_TIMEOUT_S:-120}"
      SIMPLEAGENT_QUEUE_MAX_ATTEMPTS: "${SIMPLEAGENT_QUEUE_MAX_ATTEMPTS:-5}"
      SIMPLEAGENT_QUEUE_RETRY_BASE_S: "${SIMPLEAGENT_QUEUE_RETRY_BASE_S:-2}"
      SIMPLEAGENT_QUEUE_RETRY_CAP_S: "${SIMPLEAGENT_QUEUE_RETRY_CAP_S:-60}"
      SIMPLEAGENT_AUTOSCALE_INBOUND_TARGET_READY_PER_WORKER: "${SIMPLEAGENT_AUTOSCALE_INBOUND_TARGET_READY_PER_WORKER:-20}"
      SIMPLEAGENT_AUTOSCALE_OUTBOUND_TARGET_READY_PER_WORKER: "${SIMPLEAGENT_AUTOSCALE_OUTBOUND_TARGET_READY_PER_WORKER:-40}"
      SIMPLEAGENT_AUTOSCALE_EXECUTOR_MIN_WORKERS: "${SIMPLEAGENT_AUTOSCALE_EXECUTOR_MIN_WORKERS:-0}"
      SIMPLEAGENT_AUTOSCALE_EXECUTOR_MAX_WORKERS: "${SIMPLEAGENT_AUTOSCALE_EXECUTOR_MAX_WORKERS:-100}"
      SIMPLEAGENT_AUTOSCALE_DELIVERY_MIN_WORKERS: "${SIMPLEAGENT_AUTOSCALE_DELIVERY_MIN_WORKERS:-0}"
      SIMPLEAGENT_AUTOSCALE_DELIVERY_MAX_WORKERS: "${SIMPLEAGENT_AUTOSCALE_DELIVERY_MAX_WORKERS:-100}"
      SIMPLEAGENT_AUTOSCALE_MAX_STEP_UP: "${SIMPLEAGENT_AUTOSCALE_MAX_STEP_UP:-10}"
      SIMPLEAGENT_AUTOSCALE_MAX_STEP_DOWN: "${SIMPLEAGENT_AUTOSCALE_MAX_STEP_DOWN:-10}"
      SIMPLEAGENT_DB_PATH: "${SIMPLEAGENT_DB_PATH:-/data/simpleagent.db}"
      SIMPLEAGENT_BOT_CONTEXT_DIR: "${SIMPLEAGENT_BOT_CONTEXT_DIR:-/data/bot_context}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      SIMPLEAGENT_LLM_API_KEY: "${SIMPLEAGENT_LLM_API_KEY:-}"
      SIMPLEAGENT_WEB_ENABLED: "${SIMPLEAGENT_WEB_ENABLED:-1}"
      SIMPLEAGENT_SYSTEM_PROMPT: "${SIMPLEAGENT_SYSTEM_PROMPT:-You are SimpleAgent, a concise, practical operations assistant.}"
      SIMPLEAGENT_FORWARD_ENABLED: "${SIMPLEAGENT_FORWARD_ENABLED:-0}"
      SIMPLEAGENT_FORWARD_URL: "${SIMPLEAGENT_FORWARD_URL:-}"
      SIMPLEAGENT_FORWARD_TOKEN: "${SIMPLEAGENT_FORWARD_TOKEN:-}"
      SIMPLEAGENT_PUBLIC_BASE_URL: "${SIMPLEAGENT_PUBLIC_BASE_URL:-}"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - /opt/simpleagent/data:/data
